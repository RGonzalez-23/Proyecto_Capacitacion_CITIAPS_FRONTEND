<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo -->
  <rect width="100" height="100" fill="#22ab99" rx="20"/>
  
  <!-- Icono de lista de tareas -->
  <g fill="white">
    <!-- Caja de lista -->
    <rect x="15" y="20" width="70" height="60" rx="4" fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Línea 1 -->
    <line x1="30" y1="35" x2="60" y2="35" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Línea 2 -->
    <line x1="30" y1="50" x2="60" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Línea 3 -->
    <line x1="30" y1="65" x2="60" y2="65" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Checkbox marcado (línea 1) -->
    <circle cx="20" cy="35" r="3" fill="white"/>
    
    <!-- Checkbox (línea 2) -->
    <circle cx="20" cy="50" r="3" fill="white"/>
    
    <!-- Checkbox (línea 3) -->
    <circle cx="20" cy="65" r="3" fill="white"/>
  </g>
</svg>
